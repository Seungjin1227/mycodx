    <path d="M230 615 L430 485 L675 340 L940 205" stroke="#d8e1e8" stroke-width="44"/>
    <path d="M230 615 L430 485 L675 340 L940 205" stroke="#ffffff" stroke-width="28"/>
    <path d="M730 620 L690 478 L675 340 L630 190" stroke="#d8e1e8" stroke-width="38"/>
    <path d="M730 620 L690 478 L675 340 L630 190" stroke="#ffffff" stroke-width="22"/>
    <path d="M390 270 H785" stroke="#d8e1e8" stroke-width="32"/>
    <path d="M390 270 H785" stroke="#ffffff" stroke-width="18"/>
