    <rect x="515" y="260" width="185" height="64" rx="18" fill="#f3f7fa" stroke="#dfe5ea"/>
    <text x="607" y="300" text-anchor="middle" fill="#18324f" font-family="Arial, sans-serif" font-size="19" font-weight="800">미래빌딩</text>
