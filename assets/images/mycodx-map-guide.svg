  <rect x="132" y="285" width="278" height="116" rx="22" fill="#f8fafc" stroke="#dfe5ea"/>
  <text x="162" y="326" fill="#0f243b" font-family="Arial, sans-serif" font-size="22" font-weight="900">주소</text>
  <text x="162" y="362" fill="#5f6b7a" font-family="Arial, sans-serif" font-size="17">경상남도 창원시 의창구</text>
  <text x="162" y="390" fill="#5f6b7a" font-family="Arial, sans-serif" font-size="17">용동로83번안길 7</text>

  <text x="600" y="662" text-anchor="middle" fill="#8a95a3" font-family="Arial, sans-serif" font-size="14">※ 본 약도는 위치 안내용으로 직접 제작한 단순 도식이며 실제 지도 축척과 다를 수 있습니다.</text>
