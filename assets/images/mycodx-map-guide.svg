  <text x="770" y="394" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="900">MycoDx</text>
  <text x="770" y="430" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">미래빌딩 202호</text>
  <text x="770" y="460" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">용동로83번안길 7</text>

  <g fill="none" stroke="#a11a2f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M365 560 C455 510, 545 455, 650 405" stroke-dasharray="16 16"/>
    <path d="M650 405 L619 402 M650 405 L632 431"/>
