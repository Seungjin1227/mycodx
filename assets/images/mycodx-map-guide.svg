      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef3f7"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18324f"/>
      <stop offset="100%" stop-color="#0f243b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#18324f" flood-opacity="0.16"/>
