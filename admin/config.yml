backend:
  name: github
  repo: mycodx84/mycodx84.github.io
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - name: "content"
        label: "Content"
        file: "data/content.json"
        format: "json"
        fields:
          - label: "Team"
            name: "team"
            widget: "list"
            summary: "{{fields.order}}. {{fields.name}} - {{fields.role}}"
            fields:
              - { label: "Order", name: "order", widget: "number", value_type: "int", default: 1 }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Summary", name: "summary", widget: "text" }
              - { label: "Photo", name: "image", widget: "image", required: false }

          - label: "News"
            name: "news"
            widget: "list"
            summary: "{{fields.date}} - {{fields.title}}"
            fields:
              - { label: "Date", name: "date", widget: "string", hint: "Example: 2026.06.04 or 2026.06" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Summary", name: "summary", widget: "text" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - label: "Fallback Visual"
                name: "visual"
                widget: "select"
                required: false
                options:
                  - { label: "Plate", value: "plateImg" }
                  - { label: "Analysis Screen", value: "screenImg" }
                  - { label: "Tube", value: "tubeImg" }
                  - { label: "Research", value: "researchThumb" }

          - label: "Board"
            name: "board"
            widget: "list"
            summary: "{{fields.date}} - {{fields.title}}"
            fields:
              - { label: "Label", name: "label", widget: "string", hint: "Example: Notice, Research, Event" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Notice", value: "notice" }
                  - { label: "Research", value: "research" }
                  - { label: "Event", value: "event" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "string", hint: "Example: 2026.06.04" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Body", name: "body", widget: "text", required: false }
              - { label: "URL", name: "url", widget: "string", required: false }

          - label: "Gallery"
            name: "gallery"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - label: "Fallback Visual"
                name: "visual"
                widget: "select"
                required: false
                options:
                  - { label: "Plate", value: "plateImg" }
                  - { label: "Analysis Screen", value: "screenImg" }
                  - { label: "Tube", value: "tubeImg" }
                  - { label: "Research", value: "researchThumb" }
